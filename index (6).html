<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bash The Computer</title>
  <script src="https://unpkg.com/@ruffle-rs/ruffle@0.2.0/dist/ruffle.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      width: 100%;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: #111;
      color: #fff;
      font-family: Arial, sans-serif;
    }
    .credit {
      margin-bottom: 12px;
      color: #bbb;
      font-size: 0.95rem;
    }
    h1 {
      margin-bottom: 18px;
      font-size: 2.5rem;
      text-align: center;
    }
    #ruffle-container {
      width: 900px;
      max-width: 100%;
      height: 600px;
      border: 3px solid #444;
      background: #000;
    }
    .fallback {
      padding: 24px;
      color: #ddd;
      text-align: center;
    }
  </style>
</head>
<body>
  <p class="credit">Html created by Jaydenn</p>
  <h1>Bash The Computer</h1>
  <div id="ruffle-container">
    <object data="assets/bash-the-computer.swf" type="application/x-shockwave-flash" width="100%" height="100%">
      <param name="movie" value="assets/bash-the-computer.swf" />
      <p class="fallback">Bash The Computer is loading in Ruffle. If it does not appear, ensure JavaScript is enabled.</p>
    </object>
  </div>

  <script>
    window.addEventListener('load', function () {
      if (window.RufflePlayer) {
        const ruffle = window.RufflePlayer.newest();
        const player = ruffle.createPlayer();
        player.style.width = '100%';
        player.style.height = '100%';

        const container = document.getElementById('ruffle-container');
        container.innerHTML = '';
        container.appendChild(player);

        player.load('assets/bash-the-computer.swf');
      }
    });
  </script>
</body>
</html>
